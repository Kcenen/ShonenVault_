<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShonenVault</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:#fff;
}


header{
    padding:16px;
    background:#020617;
    text-align:center;
    letter-spacing:1px;
}

.logo{
    font-size:20px;
    font-weight:700;
    color:#f472b6;
}


.container{
    padding:14px;
}

.section-title{
    margin:10px 0 14px;
    font-size:17px;
    opacity:0.9;
}


.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:12px;
}


.card{
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    transition:0.25s ease;
}

.card:hover{
    transform:scale(1.04);
}

.card a{
    display:block;
    text-decoration:none;
    color:white;
}

.card img{
    width:100%;
    height:175px;
    object-fit:cover;
    display:block;
}

.card p{
    padding:7px 6px;
    font-size:13.5px;
    text-align:center;
    line-height:1.2;
}
</style>

</head>

<body>

<header>
    <div class="logo">ShonenVault</div>
</header>

<div class="container">

    <div class="section-title">Popular Romance Anime</div>

    <div class="grid">

        <div class="card">
            <a href="https://9animetv.to/watch/you-and-i-are-polar-opposites-20369?ep=163669" target="_blank">
                <img src="images (8).jpeg">
                <p>You and I Are Polar Opposites</p>
            </a>
        </div>

        <div class="card">
            <a href="https://9animetv.to/watch/blue-box-19326?ep=128367" target="_blank">
                <img src="images (10).jpeg">
                <p>Blue Box</p>
            </a>
        </div>

        <div class="card">
            <a href="https://9animetv.to/watch/the-fragrant-flower-blooms-with-dignity-19789" target="_blank">
                <img src="images (9).jpeg">
                <p>The Fragrant Flower Blooms With Dignity</p>
            </a>
        </div>

        <div class="card">
            <a href="https://9animetv.to/watch/horimiya-15733" target="_blank">
                <img src="images (11).jpeg">
                <p>Horimiya</p>
            </a>
        </div>

        <div class="card">
            <a href="https://9animetv.to/watch/kimi-ni-todoke-from-me-to-you-482?ep=9944" target="_blank">
                <img src="images (12).jpeg">
                <p>Kimi ni Todoke</p>
            </a>
        </div>

        <div class="card">
            <a href="https://9animetv.to/watch/my-dress-up-darling-17930?ep=85827" target="_blank">
                <img src="images (13).jpeg">
                <p>My Dress-Up Darling</p>
            </a>
        </div>

        <div class="card">
            <a href="https://9animetv.to/watch/toradora-232?ep=4951" target="_blank">
                <img src="images (14).jpeg">
                <p>Toradora</p>
            </a>
        </div>

        <div class="card">
            <a href="https://9animetv.to/watch/your-lie-in-april-31?ep=926" target="_blank">
                <img src="images (15).jpeg">
                <p>Your Lie in April</p>
            </a>
        </div>

        <div class="card">
            <a href="https://9animetv.to/watch/rascal-does-not-dream-of-bunny-girl-senpai-149?ep=4008" target="_blank">
                <img src="images (16).jpeg">
                <p>Bunny Girl Senpai</p>
            </a>
        </div>

    </div>

</div>

</body>
</html>
